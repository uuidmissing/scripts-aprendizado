<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo HTML Moderno</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .page {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #ffffff;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.08);
      border-radius: 10px;
    }
    h1 {
      margin-top: 0;
      color: #1d4ed8;
    }
    p {
      line-height: 1.8;
    }
    .highlight {
      color: #dc2626;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
    }
    th, td {
      border: 2px solid #2563eb;
      padding: 12px;
      text-align: center;
    }
    th {
      background: #eff6ff;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Olá, mundo!</h1>
    <p>Este é um exemplo de HTML moderno e válido.</p>
    <p class="highlight">Não use <code>&lt;font&gt;</code> ou <code>&lt;marquee&gt;</code>, pois são elementos obsoletos.</p>

    <section>
      <h2>Exemplo de tabela</h2>
      <p>Use tabelas apenas para dados tabulares, não para layout.</p>
      <table>
        <tr>
          <th>Coluna 1</th>
          <th>Coluna 2</th>
          <th>Coluna 3</th>
        </tr>
        <tr>
          <td>Item A</td>
          <td>Item B</td>
          <td>Item C</td>
        </tr>
      </table>
    </section>
  </div>
</body>
</html>
